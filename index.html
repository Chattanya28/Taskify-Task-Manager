<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>Taskify • Focus Flow</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
</head>
<body>
  <div class="background"></div>
  
  <div class="app">
    <header>
      <div class="logo">
        <i class="fas fa-tasks"></i>
        <h1>Taskify</h1>
      </div>
      <div class="header-actions">
        <button id="focus-mode-btn" class="theme-btn" title="Focus Mode">
          <i class="fas fa-eye"></i>
        </button>
        <button id="theme-toggle" class="theme-btn" title="Dark/Light Mode">
          <i class="fas fa-moon"></i>
        </button>
      </div>
    </header>

    <div class="stats glass">
      <div class="progress-circle">
        <svg viewBox="0 0 36 36">
          <path d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="3"/>
          <path id="progress-path" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="#4facfe" stroke-width="3" stroke-dasharray="0, 100"/>
        </svg>
        <span id="progress-text">0%</span>
      </div>
      <div class="stat-info">
        <p id="task-count">0 tasks • 0 completed</p>
        <div class="streak-badge">
          <i class="fas fa-fire"></i>
          <span id="streak-count">0</span> day streak
        </div>
      </div>
    </div>

    <div class="input-area glass">
      <div class="input-row">
        <input type="text" id="task-input" placeholder="What needs to be done today?" autocomplete="off" />
        <button id="add-btn"><i class="fas fa-plus"></i> Add</button>
      </div>
      
      <div class="extra-inputs">
        <div class="priority-select">
          <i class="fas fa-flag"></i>
          <select id="priority">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High 🔥</option>
          </select>
        </div>
        
        <div class="date-input">
          <i class="fas fa-calendar-alt"></i>
          <input type="date" id="due-date" />
        </div>
        
        <div class="category-select">
          <i class="fas fa-tag"></i>
          <select id="category">
            <option value="Personal">Personal</option>
            <option value="Work">Work</option>
            <option value="Health">Health</option>
            <option value="Study">Study</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>
    </div>

    <div class="filters glass">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="completed">Done</button>
      <button class="filter-btn" data-filter="today">Today</button>
    </div>

    <div class="search-bar glass">
      <i class="fas fa-search"></i>
      <input type="text" id="search-input" placeholder="Search tasks..." />
    </div>

    <ul id="task-list" class="glass"></ul>

    <div class="footer glass">
      <div class="footer-left">
        <span id="active-tasks-count">0</span> active tasks
      </div>
      <button id="clear-completed">Clear Completed</button>
    </div>
  </div>

  <div id="toast-notification" class="toast"></div>

  <script src="script.js"></script>
</body>
</html>
